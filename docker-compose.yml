version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hotels_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: hotels
    volumes:
      - mongodb_data:/data/db
    networks:
      - hotels_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotels_backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/hotels
      PORT: 5000
      JWT_SECRET: your-secret-key-change-in-production
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - hotels_network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotels_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - hotels_network

volumes:
  mongodb_data:

networks:
  hotels_network:
    driver: bridge
